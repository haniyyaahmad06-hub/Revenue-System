<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Records - RevenueTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f1f5f9;
            color: var(--dark);
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar (same as dashboard) */
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.05);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    /* For browsers that support it */
    -webkit-background-clip: text;
    -moz-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    /* Fallback for browsers that don't support background-clip: text */
    color: var(--primary);
}

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sidebar-menu a i {
            width: 22px;
            font-size: 18px;
        }

        .sidebar-menu a:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        /* Top Bar */
        .top-bar {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .page-title h1 {
            font-size: 24px;
            color: var(--dark);
            font-weight: 700;
        }

        .page-title p {
            color: var(--gray);
            font-size: 14px;
            margin-top: 5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 15px 5px 5px;
            background: #f8fafc;
            border-radius: 50px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-name {
            font-weight: 600;
            color: var(--dark);
        }

        .btn-logout {
            padding: 8px 20px;
            border-radius: 50px;
            background: transparent;
            border: 2px solid var(--danger);
            color: var(--danger);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        /* Search Section */
        .search-section {
            background: white;
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .search-header h2 {
            font-size: 20px;
            color: var(--dark);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
        }

        .filter-tab {
            padding: 10px 20px;
            border-radius: 50px;
            background: #f8fafc;
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 14px;
        }

        .filter-tab:hover {
            background: #e2e8f0;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
        }

        .search-input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .date-filters {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-input {
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 14px;
            color: var(--dark);
        }

        .btn-search {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }

        .btn-reset {
            padding: 12px 25px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            color: var(--gray);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #e2e8f0;
        }

        /* Results Section */
        .results-section {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .results-header h3 {
            font-size: 18px;
            color: var(--dark);
        }

        .results-count {
            color: var(--gray);
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: var(--gray);
            font-weight: 600;
            font-size: 14px;
            border-radius: 12px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--dark);
        }

        .type-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .type-sale {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .type-expense {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .type-product {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .amount-positive {
            color: var(--success);
            font-weight: 600;
        }

        .amount-negative {
            color: var(--danger);
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: var(--gray);
        }

        .no-results i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f8fafc;
            border: none;
            color: var(--gray);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover {
            background: #e2e8f0;
        }

        .page-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            
            .sidebar .logo-text,
            .sidebar-menu a span {
                display: none;
            }
            
            .main-content {
                margin-left: 80px;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .date-filters {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span class="logo-text">RevenueTracker</span>
            </div>
            
            <ul class="sidebar-menu">
                <li>
                    <a href="/dashboard">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/products">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                    </a>
                </li>
                <li>
                    <a href="/sales">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Sales</span>
                    </a>
                </li>
                <li>
                    <a href="/expenses">
                        <i class="fas fa-file-invoice"></i>
                        <span>Expenses</span>
                    </a>
                </li>
                <li>
                    <a href="/view-records" class="active">
                        <i class="fas fa-search"></i>
                        <span>View Records</span>
                    </a>
                </li>
                <li>
                    <a href="/profit-loss">
                        <i class="fas fa-chart-line"></i>
                        <span>Profit & Loss</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <h1>View Records</h1>
                    <p>Search and filter through all your business data</p>
                </div>
                <div class="user-info">
                    <div class="user-profile">
                        <div class="user-avatar" id="userInitials"></div>
                        <span class="user-name" id="displayName"></span>
                    </div>
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </button>
                </div>
            </div>

            <!-- Search Section -->
            <div class="search-section">
                <div class="search-header">
                    <h2>Search Records</h2>
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterType('all')">All</button>
                        <button class="filter-tab" onclick="filterType('products')">Products</button>
                        <button class="filter-tab" onclick="filterType('sales')">Sales</button>
                        <button class="filter-tab" onclick="filterType('expenses')">Expenses</button>
                    </div>
                </div>
                
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" class="search-input" id="searchInput" placeholder="Search by name, description, or amount..." onkeyup="searchRecords()">
                    </div>
                </div>
                
                <div class="date-filters">
                    <input type="date" class="date-input" id="startDate" onchange="searchRecords()">
                    <span>to</span>
                    <input type="date" class="date-input" id="endDate" onchange="searchRecords()">
                    <button class="btn-search" onclick="searchRecords()">
                        <i class="fas fa-filter"></i>
                        Apply Filters
                    </button>
                    <button class="btn-reset" onclick="resetFilters()">
                        <i class="fas fa-redo"></i>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-section">
                <div class="results-header">
                    <h3>Search Results</h3>
                    <span class="results-count" id="resultsCount">0 records found</span>
                </div>
                
                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Details</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="5" class="no-results">
                                    <i class="fas fa-search"></i>
                                    <p>Start searching to see results</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        // Set user info
        const username = localStorage.getItem('username') || 'User';
        document.getElementById('displayName').textContent = username;
        document.getElementById('userInitials').textContent = username.charAt(0).toUpperCase();

        let allData = {
            products: [],
            sales: [],
            expenses: []
        };
        let filteredData = [];
        let currentType = 'all';
        let currentPage = 1;
        const itemsPerPage = 10;

        // Load all data
        async function loadAllData() {
            try {
                const [productsRes, salesRes, expensesRes] = await Promise.all([
                    fetch('/api/products', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/sales', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/expenses', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                allData.products = await productsRes.json();
                allData.sales = await salesRes.json();
                allData.expenses = await expensesRes.json();

                // Combine all data
                filteredData = combineData();
                displayResults();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // Combine all data into one array
        function combineData() {
            const combined = [];

            // Add products
            allData.products.forEach(p => {
                combined.push({
                    type: 'product',
                    date: p.created_at,
                    title: p.name,
                    description: p.description || 'No description',
                    details: `Price: $${parseFloat(p.price).toFixed(2)} | Stock: ${p.quantity}`,
                    amount: null,
                    searchable: `${p.name} ${p.description} ${p.price}`
                });
            });

            // Add sales
            allData.sales.forEach(s => {
                combined.push({
                    type: 'sale',
                    date: s.sale_date,
                    title: `Sale: ${s.product_name}`,
                    description: `${s.quantity} units sold`,
                    details: `Unit Price: $${parseFloat(s.price).toFixed(2)}`,
                    amount: parseFloat(s.total_amount),
                    searchable: `${s.product_name} ${s.quantity} ${s.total_amount}`
                });
            });

            // Add expenses
            allData.expenses.forEach(e => {
                combined.push({
                    type: 'expense',
                    date: e.expense_date,
                    title: `Expense: ${e.description}`,
                    description: e.description,
                    details: 'Business expense',
                    amount: -parseFloat(e.amount),
                    searchable: `${e.description} ${e.amount}`
                });
            });

            // Sort by date (newest first)
            return combined.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        // Filter by type
        function filterType(type) {
            currentType = type;
            currentPage = 1;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            searchRecords();
        }

        // Search records
        function searchRecords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            filteredData = combineData().filter(item => {
                // Filter by type
                if (currentType !== 'all' && item.type !== currentType.slice(0, -1)) {
                    return false;
                }

                // Filter by search term
                if (searchTerm && !item.searchable.toLowerCase().includes(searchTerm)) {
                    return false;
                }

                // Filter by date range
                if (startDate || endDate) {
                    const itemDate = new Date(item.date);
                    if (startDate && itemDate < new Date(startDate)) return false;
                    if (endDate) {
                        const endDateTime = new Date(endDate);
                        endDateTime.setHours(23, 59, 59);
                        if (itemDate > endDateTime) return false;
                    }
                }

                return true;
            });

            currentPage = 1;
            displayResults();
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            currentType = 'all';
            
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === 'All') {
                    tab.classList.add('active');
                }
            });
            
            filteredData = combineData();
            currentPage = 1;
            displayResults();
        }

        // Display results with pagination
        function displayResults() {
            const tbody = document.getElementById('tableBody');
            const resultsCount = document.getElementById('resultsCount');
            const pagination = document.getElementById('pagination');

            resultsCount.textContent = `${filteredData.length} records found`;

            if (filteredData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="no-results">
                            <i class="fas fa-search"></i>
                            <p>No records found</p>
                        </td>
                    </tr>
                `;
                pagination.innerHTML = '';
                return;
            }

            // Pagination
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);

            // Display rows
            tbody.innerHTML = pageData.map(item => {
                let typeClass = '';
                let typeText = '';
                
                if (item.type === 'product') {
                    typeClass = 'type-product';
                    typeText = 'Product';
                } else if (item.type === 'sale') {
                    typeClass = 'type-sale';
                    typeText = 'Sale';
                } else {
                    typeClass = 'type-expense';
                    typeText = 'Expense';
                }

                const amountClass = item.amount && item.amount < 0 ? 'amount-negative' : 'amount-positive';
                const amountText = item.amount ? 
                    (item.amount < 0 ? `-$${Math.abs(item.amount).toFixed(2)}` : `$${item.amount.toFixed(2)}`) : 
                    '-';

                return `
                    <tr>
                        <td><span class="type-badge ${typeClass}">${typeText}</span></td>
                        <td>${new Date(item.date).toLocaleString()}</td>
                        <td>
                            <strong>${item.title}</strong><br>
                            <small style="color: var(--gray);">${item.description}</small>
                        </td>
                        <td>${item.details}</td>
                        <td class="${amountClass}">${amountText}</td>
                    </tr>
                `;
            }).join('');

            // Create pagination buttons
            let paginationHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = paginationHtml;
        }

        function goToPage(page) {
            currentPage = page;
            displayResults();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        // Load data on page load
        loadAllData();
    </script>
</body>
</html>
