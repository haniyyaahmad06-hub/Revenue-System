<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - RevenueTracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span class="logo-text">RevenueTracker</span>
            </div>

            <ul class="sidebar-menu">
                <li>
                    <a href="/dashboard">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/products">
                        <i class="fas fa-box"></i>
                        <span>Products</span>
                    </a>
                </li>
                <li>
                    <a href="/sales">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Sales</span>
                    </a>
                </li>
                <li>
                    <a href="/expenses" class="active">
                        <i class="fas fa-file-invoice"></i>
                        <span>Expenses</span>
                    </a>
                </li>
                <li>
                    <a href="/view-records">
                        <i class="fas fa-search"></i>
                        <span>View Records</span>
                    </a>
                </li>
                <li>
                    <a href="/profit-loss">
                        <i class="fas fa-chart-line"></i>
                        <span>Profit & Loss</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <h1>Expenses</h1>
                    <p>Add and manage your business expenses</p>
                </div>

                <div class="user-info">
                    <div class="user-profile">
                        <div class="user-avatar" id="userInitials"></div>
                        <span class="user-name" id="displayName"></span>
                    </div>
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </button>
                </div>
            </div>

            <!-- Page Content -->
            <div class="content-wrapper">
                <!-- Add Expense Form -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-plus-circle"></i> Add New Expense
                    </div>
                    <div class="card-body">
                        <form id="expenseForm">
                            <div class="form-group">
                                <label>Description</label>
                                <input type="text" class="form-control" id="expenseDescription" placeholder="e.g., Rent, Electricity, Salary" required>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" step="0.01" class="form-control" id="expenseAmount" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i>
                                Add Expense
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Expenses List -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list"></i> Expense List
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table" id="expensesTable">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Description</th>
                                        <th>Amount</th>
                                    </tr>
                                </thead>
                                <tbody id="expenses-body">
                                    <tr><td colspan="3" class="text-center">Loading...</td></tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <th colspan="2">Total</th>
                                        <th id="total-expenses">$0.00</th>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    const username = localStorage.getItem('username') || 'User';
    document.getElementById('displayName').textContent = username;
    document.getElementById('userInitials').textContent = username.charAt(0).toUpperCase();

    let currentEditId = null;

    async function fetchExpenses() {
        try {
            const response = await fetch('/api/expenses', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const expenses = await response.json();

            const tbody = document.getElementById('expenses-body');
            let total = 0;

            if (expenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No expenses recorded</td></tr>';
            } else {
                tbody.innerHTML = expenses.map(expense => {
                    total += parseFloat(expense.amount);
                    return `
                        <tr>
                            <td>${new Date(expense.expense_date).toLocaleString()}</td>
                            <td>${expense.description}</td>
                            <td>$${parseFloat(expense.amount).toFixed(2)}</td>
                            <td>
                                <button onclick="editExpense(${expense.id}, '${expense.description}', ${expense.amount})" 
                                        class="btn-edit" style="background:#f59e0b; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                            <td>
                                <button onclick="deleteExpense(${expense.id})" 
                                        class="btn-delete" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            document.getElementById('total-expenses').textContent = `$${total.toFixed(2)}`;
        } catch (error) {
            console.error('Error:', error);
        }
    }

    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const expense = {
            description: document.getElementById('expenseDescription').value,
            amount: document.getElementById('expenseAmount').value
        };

        const url = currentEditId ? `/api/expenses/${currentEditId}` : '/api/expenses';
        const method = currentEditId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(expense)
            });

            if (response.ok) {
                alert(currentEditId ? 'Expense updated!' : 'Expense added!');
                document.getElementById('expenseForm').reset();
                resetForm();
                fetchExpenses();
            } else {
                const data = await response.json();
                alert(data.error || 'Error saving expense');
            }
        } catch (error) {
            alert('Error saving expense');
        }
    });

    function editExpense(id, description, amount) {
        currentEditId = id;
        document.getElementById('expenseDescription').value = description;
        document.getElementById('expenseAmount').value = amount;
        
        document.querySelector('.card-header').innerHTML = '<i class="fas fa-edit"></i> Edit Expense';
        document.querySelector('button[type="submit"]').textContent = 'Update Expense';
        addCancelButton();
    }

    async function deleteExpense(id) {
        if (!confirm('Delete this expense?')) return;

        try {
            const response = await fetch(`/api/expenses/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                alert('Expense deleted');
                fetchExpenses();
            } else {
                alert('Error deleting expense');
            }
        } catch (error) {
            alert('Error deleting expense');
        }
    }

    function resetForm() {
        currentEditId = null;
        document.querySelector('.card-header').innerHTML = '<i class="fas fa-plus-circle"></i> Add New Expense';
        document.querySelector('button[type="submit"]').textContent = 'Add Expense';
        const cancelBtn = document.getElementById('cancelBtn');
        if (cancelBtn) cancelBtn.remove();
    }

    function addCancelButton() {
        let cancelBtn = document.getElementById('cancelBtn');
        if (!cancelBtn) {
            cancelBtn = document.createElement('button');
            cancelBtn.id = 'cancelBtn';
            cancelBtn.type = 'button';
            cancelBtn.className = 'btn btn-secondary';
            cancelBtn.style.marginLeft = '10px';
            cancelBtn.style.background = '#6c757d';
            cancelBtn.style.color = 'white';
            cancelBtn.innerHTML = '<i class="fas fa-times"></i> Cancel';
            cancelBtn.onclick = resetForm;
            document.querySelector('.card-body').appendChild(cancelBtn);
        }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        window.location.href = '/';
    }

    fetchExpenses();
</script>
</body>
</html>
