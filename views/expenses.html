<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Revenue Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Revenue Tracker</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/products"><i class="fas fa-box"></i> Products</a>
                <a href="/sales"><i class="fas fa-shopping-cart"></i> Sales</a>
                <a href="/expenses" class="active"><i class="fas fa-file-invoice"></i> Expenses</a>
                <a href="/profit-loss"><i class="fas fa-chart-line"></i> Profit & Loss</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="top-navbar">
                <h2>Expenses</h2>
                <div class="user-info">
                    <span id="username"></span>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Add Expense Form -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-plus-circle"></i> Add New Expense
                    </div>
                    <div class="card-body">
                        <form id="expenseForm">
                            <div class="form-group">
                                <label>Description</label>
                                <input type="text" class="form-control" id="expenseDescription" placeholder="e.g., Rent, Electricity, Salary" required>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" step="0.01" class="form-control" id="expenseAmount" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Expense</button>
                        </form>
                    </div>
                </div>

                <!-- Expenses List -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list"></i> Expense List
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table" id="expensesTable">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Description</th>
                                        <th>Amount</th>
                                    </tr>
                                </thead>
                                <tbody id="expenses-body">
                                    <tr><td colspan="3" class="text-center">Loading...</td></tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <th colspan="2">Total</th>
                                        <th id="total-expenses">$0.00</th>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        document.getElementById('username').textContent = localStorage.getItem('username');

        async function fetchExpenses() {
            try {
                const response = await fetch('/api/expenses', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const expenses = await response.json();
                
                const tbody = document.getElementById('expenses-body');
                let total = 0;
                
                if (expenses.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center">No expenses recorded yet</td></tr>';
                } else {
                    tbody.innerHTML = expenses.map(expense => {
                        total += parseFloat(expense.amount);
                        return `
                            <tr>
                                <td>${new Date(expense.expense_date).toLocaleString()}</td>
                                <td>${expense.description}</td>
                                <td>$${parseFloat(expense.amount).toFixed(2)}</td>
                            </tr>
                        `;
                    }).join('');
                }
                
                document.getElementById('total-expenses').textContent = `$${total.toFixed(2)}`;
            } catch (error) {
                console.error('Error fetching expenses:', error);
            }
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const expense = {
                description: document.getElementById('expenseDescription').value,
                amount: document.getElementById('expenseAmount').value
            };

            try {
                const response = await fetch('/api/expenses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(expense)
                });

                if (response.ok) {
                    alert('Expense added successfully!');
                    document.getElementById('expenseForm').reset();
                    fetchExpenses();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Error adding expense');
                }
            } catch (error) {
                alert('Error adding expense');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        fetchExpenses();
    </script>
</body>
</html>
