<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Revenue Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Revenue Tracker</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/products" class="active"><i class="fas fa-box"></i> Products</a>
                <a href="/sales"><i class="fas fa-shopping-cart"></i> Sales</a>
                <a href="/expenses"><i class="fas fa-file-invoice"></i> Expenses</a>
                <a href="/profit-loss"><i class="fas fa-chart-line"></i> Profit & Loss</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="top-navbar">
                <h2>Products</h2>
                <div class="user-info">
                    <span id="username"></span>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Add Product Form -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-plus"></i> Add New Product
                    </div>
                    <div class="card-body">
                        <form id="productForm">
                            <div class="form-group">
                                <label>Product Name</label>
                                <input type="text" class="form-control" id="productName" required>
                            </div>
                            <div class="form-group">
                                <label>Price</label>
                                <input type="number" step="0.01" class="form-control" id="productPrice" required>
                            </div>
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="number" class="form-control" id="productQuantity" required>
                            </div>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea class="form-control" id="productDescription" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Product</button>
                        </form>
                    </div>
                </div>

                <!-- Products List -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list"></i> Product List
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table" id="productsTable">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Price</th>
                                        <th>Quantity</th>
                                        <th>Description</th>
                                        <th>Added</th>
                                    </tr>
                                </thead>
                                <tbody id="products-body">
                                    <tr><td colspan="6" class="text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        document.getElementById('username').textContent = localStorage.getItem('username');

        async function fetchProducts() {
            try {
                const response = await fetch('/api/products', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const products = await response.json();
                
                const tbody = document.getElementById('products-body');
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No products added yet</td></tr>';
                } else {
                    tbody.innerHTML = products.map(product => `
                        <tr>
                            <td>${product.id}</td>
                            <td>${product.name}</td>
                            <td>$${parseFloat(product.price).toFixed(2)}</td>
                            <td>${product.quantity}</td>
                            <td>${product.description || '-'}</td>
                            <td>${new Date(product.created_at).toLocaleDateString()}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error fetching products:', error);
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const product = {
                name: document.getElementById('productName').value,
                price: document.getElementById('productPrice').value,
                quantity: document.getElementById('productQuantity').value,
                description: document.getElementById('productDescription').value
            };

            try {
                const response = await fetch('/api/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(product)
                });

                if (response.ok) {
                    alert('Product added successfully!');
                    document.getElementById('productForm').reset();
                    fetchProducts();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Error adding product');
                }
            } catch (error) {
                alert('Error adding product');
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        }

        fetchProducts();
    </script>
</body>
</html>
